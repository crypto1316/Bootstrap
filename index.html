<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fbc2eb, #fcd5ce); /* pastel pink */
}

/* Hero */
.hero {
    padding: 100px 20px;
    text-align: center;
    color: #333;
}

/* Buttons */
.btn-custom {
    border-radius: 25px;
}

/* Cards */
.card {
    border: none;
    border-radius: 15px;
    background: #fff;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<!-- Hero -->
<section class="hero">
    <h1 class="fw-bold display-4">Hashini</h1>
    <p class="lead">B.Sc Computer Science Student | Web Developer</p>

    <button class="btn btn-dark btn-custom m-2">View Projects</button>
    <button class="btn btn-outline-dark btn-custom m-2">Contact Me</button>
</section>

<!-- Cards -->
<div class="container my-5">
    <div class="row g-4 text-center">

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h4>Projects</h4>
                <p>Portfolio Website, Python Programs, Mini Web Apps.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h4>Technical Skills</h4>
                <p>Python, C, HTML, CSS, JavaScript</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h4>Soft Skills</h4>
                <p>Communication, Teamwork, Problem Solving</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
